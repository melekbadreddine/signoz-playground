version: '3.8'

services:
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      - OTEL_SERVICE_NAME=api-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=signoz-otel-collector:4317
      - ORDER_SERVICE_URL=http://order-service:8001
    networks:
      - observability

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8001:8001"
    environment:
      - OTEL_SERVICE_NAME=order-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=signoz-otel-collector:4317
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
      - NOTIFICATION_SERVICE_URL=http://notification-service:8003
    networks:
      - observability

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8002:8002"
    environment:
      - OTEL_SERVICE_NAME=inventory-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=signoz-otel-collector:4317
    networks:
      - observability

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8003:8003"
    environment:
      - OTEL_SERVICE_NAME=notification-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=signoz-otel-collector:4317
    networks:
      - observability

  loadgen:
    build: ./loadgen
    container_name: loadgen
    depends_on:
      - api-gateway
    networks:
      - observability

networks:
  observability:
    external: true

# NOTE: Before running 'docker compose up', make sure you have SigNoz running.
# SigNoz creates a network (usually 'signoz_default' or you can create 'observability').
# If SigNoz is already running, you might need to change 'external: true' name 
# to match SigNoz's network name, or use:
#
# docker network create observability
#
# And then ensure SigNoz services are also on this network.
# To install SigNoz:
# git clone -b main https://github.com/SigNoz/signoz.git && cd signoz/deploy/
# ./install.sh
